name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: egadisailing
          POSTGRES_PASSWORD: test-password
          POSTGRES_DB: egadisailing_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://egadisailing:test-password@localhost:5432/egadisailing_test
      REDIS_URL: redis://localhost:6379
      NEXTAUTH_SECRET: ci-test-secret-at-least-32-characters-long-xxxx
      NEXTAUTH_URL: http://localhost:3000
      APP_URL: http://localhost:3000
      CRON_SECRET: ci-test-cron-secret-at-least-32-characters-abc
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Prisma migrate deploy
        run: npx prisma migrate deploy

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint --if-present

      - name: Tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          STRIPE_SECRET_KEY: sk_test_ci
          STRIPE_WEBHOOK_SECRET: whsec_ci
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_ci
          BREVO_API_KEY: ci-brevo-test
          TURNSTILE_SECRET_KEY: ci-turnstile-test
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: ci-turnstile-test
          SEED_ADMIN_PASSWORD: ci-admin-password-test

  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - name: npm audit
        run: npm audit --audit-level=high
