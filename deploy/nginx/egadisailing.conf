# Egadisailing - Next.js app behind the central nginx-proxy container.

server {
    listen 80;
    server_name egadisailing.com www.egadisailing.com;

    return 301 https://$host$request_uri;
}

server {
    listen 80;
    server_name cdn.egadisailing.com;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name egadisailing.com www.egadisailing.com;

    ssl_certificate     /etc/nginx/ssl/egadisailing.com.pem;
    ssl_certificate_key /etc/nginx/ssl/egadisailing.com.key;

    client_max_body_size 2M;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    location ~ ^/(\.env|\.git|wp-admin|phpMyAdmin) {
        return 404;
    }

    location / {
        proxy_pass         http://egadisailing-app:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Forwarded-Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   X-Forwarded-Port 443;
        proxy_cache_bypass $http_upgrade;

        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}

server {
    listen 443 ssl;
    server_name cdn.egadisailing.com;

    ssl_certificate     /etc/nginx/ssl/egadisailing.com.pem;
    ssl_certificate_key /etc/nginx/ssl/egadisailing.com.key;

    root /usr/share/nginx/html/egadisailing-cdn;

    client_max_body_size 1M;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options "DENY" always;
    add_header Access-Control-Allow-Origin "https://egadisailing.com" always;

    location ~ ^/(\.env|\.git|wp-admin|phpMyAdmin) {
        return 404;
    }

    location /videos/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    location ~ ^/images/boats/.+/hero-video\.webm$ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    location / {
        add_header Cache-Control "public, max-age=604800, stale-while-revalidate=86400" always;
        try_files $uri =404;
    }
}
