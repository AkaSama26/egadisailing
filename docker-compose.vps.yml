services:
  postgres:
    image: postgres:16-alpine
    container_name: egadisailing-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB required}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  pgbouncer:
    image: edoburu/pgbouncer:v1.25.1-p0
    container_name: egadisailing-pgbouncer
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      POOL_MODE: transaction
      AUTH_TYPE: scram-sha-256
      DEFAULT_POOL_SIZE: 30
      MAX_CLIENT_CONN: 200
      IGNORE_STARTUP_PARAMETERS: extra_float_digits,statement_timeout
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

  redis:
    image: redis:7-alpine
    container_name: egadisailing-redis
    restart: unless-stopped
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD:?REDIS_PASSWORD required}
      - --protected-mode
      - "yes"
      - --appendonly
      - "yes"
      - --appendfsync
      - "everysec"
      - --maxmemory-policy
      - "noeviction"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_URL: ${APP_URL}
        APP_LOCALES_DEFAULT: ${APP_LOCALES_DEFAULT:-it}
        NEXTAUTH_URL: ${NEXTAUTH_URL}
        SERVER_ACTIONS_ALLOWED_ORIGINS: ${SERVER_ACTIONS_ALLOWED_ORIGINS}
        NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY}
        NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${NEXT_PUBLIC_TURNSTILE_SITE_KEY}
        NEXT_PUBLIC_GA_MEASUREMENT_ID: ${NEXT_PUBLIC_GA_MEASUREMENT_ID:-}
        NEXT_PUBLIC_GOOGLE_ADS_ID: ${NEXT_PUBLIC_GOOGLE_ADS_ID:-}
        NEXT_PUBLIC_META_PIXEL_ID: ${NEXT_PUBLIC_META_PIXEL_ID:-}
        NEXT_PUBLIC_BING_UET_TAG_ID: ${NEXT_PUBLIC_BING_UET_TAG_ID:-}
        NEXT_PUBLIC_GOOGLE_SITE_VERIFICATION: ${NEXT_PUBLIC_GOOGLE_SITE_VERIFICATION:-}
        NEXT_PUBLIC_BING_SITE_VERIFICATION: ${NEXT_PUBLIC_BING_SITE_VERIFICATION:-}
        NEXT_PUBLIC_META_DOMAIN_VERIFICATION: ${NEXT_PUBLIC_META_DOMAIN_VERIFICATION:-}
        FEATURE_OVERRIDE_ENABLED: ${FEATURE_OVERRIDE_ENABLED:-false}
        FEATURE_OVERRIDE_OTA_ENABLED: ${FEATURE_OVERRIDE_OTA_ENABLED:-false}
        OVERRIDE_CANCELLATION_RATE_SOFT_WARN: ${OVERRIDE_CANCELLATION_RATE_SOFT_WARN:-0.03}
        OVERRIDE_CANCELLATION_RATE_HARD_BLOCK: ${OVERRIDE_CANCELLATION_RATE_HARD_BLOCK:-0.05}
    container_name: egadisailing-app
    restart: unless-stopped
    stop_grace_period: 45s
    stop_signal: SIGTERM
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      DATABASE_URL_POOLED: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@pgbouncer:5432/${POSTGRES_DB}?pgbouncer=true
      DATABASE_POOL_MAX: "30"
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      APP_URL: ${APP_URL:?APP_URL required}
      APP_LOCALES_DEFAULT: ${APP_LOCALES_DEFAULT:-it}
      NEXTAUTH_URL: ${NEXTAUTH_URL:?NEXTAUTH_URL required}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?NEXTAUTH_SECRET required}
      AUTH_URL: ${AUTH_URL:-${NEXTAUTH_URL}}
      AUTH_SECRET: ${AUTH_SECRET:-${NEXTAUTH_SECRET}}
      AUTH_TRUST_HOST: ${AUTH_TRUST_HOST:-true}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:?required}
      SERVER_ACTIONS_ALLOWED_ORIGINS: ${SERVER_ACTIONS_ALLOWED_ORIGINS:?required}
      CRON_SECRET: ${CRON_SECRET:?CRON_SECRET required}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:?required}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:?required}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:?required}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY:?required}
      FEATURE_STRIPE_CHECKOUT_ENABLED: ${FEATURE_STRIPE_CHECKOUT_ENABLED:-false}
      NEXT_PUBLIC_GA_MEASUREMENT_ID: ${NEXT_PUBLIC_GA_MEASUREMENT_ID:-}
      NEXT_PUBLIC_GOOGLE_ADS_ID: ${NEXT_PUBLIC_GOOGLE_ADS_ID:-}
      NEXT_PUBLIC_META_PIXEL_ID: ${NEXT_PUBLIC_META_PIXEL_ID:-}
      NEXT_PUBLIC_BING_UET_TAG_ID: ${NEXT_PUBLIC_BING_UET_TAG_ID:-}
      NEXT_PUBLIC_GOOGLE_SITE_VERIFICATION: ${NEXT_PUBLIC_GOOGLE_SITE_VERIFICATION:-}
      NEXT_PUBLIC_BING_SITE_VERIFICATION: ${NEXT_PUBLIC_BING_SITE_VERIFICATION:-}
      NEXT_PUBLIC_META_DOMAIN_VERIFICATION: ${NEXT_PUBLIC_META_DOMAIN_VERIFICATION:-}
      COOKIE_CONSENT_HASH_SECRET: ${COOKIE_CONSENT_HASH_SECRET:-}
      FEATURE_OVERRIDE_ENABLED: ${FEATURE_OVERRIDE_ENABLED:-false}
      FEATURE_OVERRIDE_OTA_ENABLED: ${FEATURE_OVERRIDE_OTA_ENABLED:-false}
      OVERRIDE_CANCELLATION_RATE_SOFT_WARN: ${OVERRIDE_CANCELLATION_RATE_SOFT_WARN:-0.03}
      OVERRIDE_CANCELLATION_RATE_HARD_BLOCK: ${OVERRIDE_CANCELLATION_RATE_HARD_BLOCK:-0.05}
      EMAIL_DELIVERY_MODE: ${EMAIL_DELIVERY_MODE:-brevo}
      BREVO_API_KEY: ${BREVO_API_KEY}
      BREVO_SMTP_HOST: ${BREVO_SMTP_HOST:-smtp-relay.brevo.com}
      BREVO_SMTP_PORT: ${BREVO_SMTP_PORT:-587}
      BREVO_SMTP_USER: ${BREVO_SMTP_USER}
      BREVO_SMTP_KEY: ${BREVO_SMTP_KEY}
      BREVO_SENDER_EMAIL: ${BREVO_SENDER_EMAIL:-info@egadisailing.com}
      BREVO_SENDER_NAME: ${BREVO_SENDER_NAME:-Egadisailing}
      BREVO_REPLY_TO: ${BREVO_REPLY_TO}
      CONTACT_PHONE: ${CONTACT_PHONE}
      TURNSTILE_SITE_KEY: ${TURNSTILE_SITE_KEY}
      TURNSTILE_SECRET_KEY: ${TURNSTILE_SECRET_KEY:?required}
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${NEXT_PUBLIC_TURNSTILE_SITE_KEY:?required}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-info@egadisailing.com}
      TRUSTED_PROXY_IPS: ${TRUSTED_PROXY_IPS:-172.16.0.0/12}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-production}
      SENTRY_RELEASE: ${SENTRY_RELEASE:-}
      BOKUN_VENDOR_ID: ${BOKUN_VENDOR_ID:-}
      BOKUN_ACCESS_KEY: ${BOKUN_ACCESS_KEY:-}
      BOKUN_SECRET_KEY: ${BOKUN_SECRET_KEY:-}
      BOKUN_WEBHOOK_SECRET: ${BOKUN_WEBHOOK_SECRET:-}
      BOKUN_API_URL: ${BOKUN_API_URL:-https://api.bokun.io}
      BOKUN_PRICE_MARKUP: ${BOKUN_PRICE_MARKUP:-1.15}
      BOATAROUND_API_URL: ${BOATAROUND_API_URL:-https://partner-api.boataround.com}
      BOATAROUND_API_TOKEN: ${BOATAROUND_API_TOKEN:-}
      BOATAROUND_WEBHOOK_SECRET: ${BOATAROUND_WEBHOOK_SECRET:-}
      IMAP_HOST: ${IMAP_HOST:-}
      IMAP_PORT: ${IMAP_PORT:-993}
      IMAP_USER: ${IMAP_USER:-}
      IMAP_PASSWORD: ${IMAP_PASSWORD:-}
      IMAP_TLS: ${IMAP_TLS:-true}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      pgbouncer:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      internal:
      proxy:
        aliases:
          - egadisailing-app

  seed:
    profiles:
      - seed
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
      args:
        APP_URL: ${APP_URL}
        NEXTAUTH_URL: ${NEXTAUTH_URL}
        SERVER_ACTIONS_ALLOWED_ORIGINS: ${SERVER_ACTIONS_ALLOWED_ORIGINS}
        NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY}
        NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${NEXT_PUBLIC_TURNSTILE_SITE_KEY}
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      NEXTAUTH_URL: ${NEXTAUTH_URL:?NEXTAUTH_URL required}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?NEXTAUTH_SECRET required}
      APP_URL: ${APP_URL:?APP_URL required}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:?required}
      CRON_SECRET: ${CRON_SECRET:?CRON_SECRET required}
      SERVER_ACTIONS_ALLOWED_ORIGINS: ${SERVER_ACTIONS_ALLOWED_ORIGINS:?required}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:?required}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:?required}
      EMAIL_DELIVERY_MODE: ${EMAIL_DELIVERY_MODE:-brevo}
      BREVO_API_KEY: ${BREVO_API_KEY}
      BREVO_SMTP_USER: ${BREVO_SMTP_USER}
      BREVO_SMTP_KEY: ${BREVO_SMTP_KEY}
      TURNSTILE_SECRET_KEY: ${TURNSTILE_SECRET_KEY:?required}
      NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${NEXT_PUBLIC_TURNSTILE_SITE_KEY:?required}
    command: ["npm", "run", "db:seed"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

volumes:
  pgdata:
    name: egadisailing_pgdata
  redis_data:
    name: egadisailing_redis_data

networks:
  internal:
    name: egadisailing_internal
    driver: bridge
  proxy:
    external: true
    name: proxy
